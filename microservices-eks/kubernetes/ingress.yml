apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: microservices-ingress
  namespace: microservices

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb

  rules:
  - http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 5000

      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-services              #service name ---- kubectl get svc
            port:
              number: 5001

      - path: /products
        pathType: Prefix
        backend:
          service:
            name: product-service
            port:
              number: 5002
